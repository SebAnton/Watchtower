<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watchtower — Test Suite</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #e2e8f0; padding: 2rem; }
        h1 { margin-bottom: 0.5rem; font-size: 1.5rem; }
        .summary { font-size: 0.9rem; color: #94a3b8; margin-bottom: 1.5rem; }
        .suite { margin-bottom: 1.5rem; border: 1px solid #1e293b; border-radius: 0.5rem; overflow: hidden; }
        .suite-header { background: #1e293b; padding: 0.6rem 1rem; font-weight: 600; font-size: 0.95rem; display: flex; justify-content: space-between; }
        .test-row { padding: 0.4rem 1rem; border-bottom: 1px solid #1e293b; font-size: 0.85rem; display: flex; justify-content: space-between; align-items: center; }
        .test-row:last-child { border-bottom: none; }
        .pass { color: #4ade80; }
        .fail { color: #f87171; }
        .badge { padding: 0.15rem 0.5rem; border-radius: 4px; font-size: 0.75rem; font-weight: 600; }
        .badge.pass { background: rgba(74,222,128,0.15); }
        .badge.fail { background: rgba(248,113,113,0.15); }
        .totals { margin-top: 1.5rem; font-size: 1.1rem; font-weight: 600; }
        .error-detail { color: #fca5a5; font-size: 0.8rem; padding: 0.2rem 1rem 0.4rem 2rem; background: rgba(248,113,113,0.05); }
    </style>
</head>
<body>
    <h1>🏰 Watchtower Test Suite</h1>
    <div class="summary">Automated tests for core application logic</div>
    <div id="results"></div>
    <div id="totals" class="totals"></div>

    <script>
    // ======================================================================
    // Minimal Test Framework
    // ======================================================================
    const suites = [];
    let currentSuite = null;

    function describe(name, fn) {
        currentSuite = { name, tests: [] };
        suites.push(currentSuite);
        fn();
        currentSuite = null;
    }

    function it(name, fn) {
        const test = { name, passed: false, error: null };
        try {
            fn();
            test.passed = true;
        } catch (e) {
            test.error = e.message;
        }
        currentSuite.tests.push(test);
    }

    function expect(actual) {
        return {
            toBe(expected) {
                if (actual !== expected) throw new Error(`Expected ${JSON.stringify(expected)}, got ${JSON.stringify(actual)}`);
            },
            toEqual(expected) {
                if (JSON.stringify(actual) !== JSON.stringify(expected)) throw new Error(`Expected ${JSON.stringify(expected)}, got ${JSON.stringify(actual)}`);
            },
            toBeGreaterThan(expected) {
                if (!(actual > expected)) throw new Error(`Expected ${actual} > ${expected}`);
            },
            toBeTruthy() {
                if (!actual) throw new Error(`Expected truthy, got ${JSON.stringify(actual)}`);
            },
            toBeFalsy() {
                if (actual) throw new Error(`Expected falsy, got ${JSON.stringify(actual)}`);
            },
            toContain(item) {
                if (Array.isArray(actual)) {
                    if (!actual.includes(item)) throw new Error(`Expected array to contain ${JSON.stringify(item)}`);
                } else if (typeof actual === 'string') {
                    if (!actual.includes(item)) throw new Error(`Expected string to contain "${item}"`);
                }
            },
            toHaveLength(len) {
                if (actual.length !== len) throw new Error(`Expected length ${len}, got ${actual.length}`);
            },
            toBeInstanceOf(cls) {
                if (!(actual instanceof cls)) throw new Error(`Expected instance of ${cls.name}`);
            }
        };
    }

    // ======================================================================
    // Test Helpers — Recreate pure functions from app.js for isolated testing
    // ======================================================================

    // Exact copy of getStatusInfo
    function getStatusInfo(statusString) {
        const status = (statusString || '').toUpperCase();
        switch(status) {
            case 'OK': return { raw: status, label: 'Operational', class: 'status-ok' };
            case 'MAJOR_INCIDENT_CORE':
            case 'MAJOR_INCIDENT_NONCORE':
            case 'INCIDENT': return { raw: status, label: 'Incident', class: 'status-critical' };
            case 'DEGRADATION':
            case 'MAINTENANCE_CORE':
            case 'MAINTENANCE_NONCORE': return { raw: status, label: 'Warning', class: 'status-warning' };
            default: return { raw: status || 'UNKNOWN', label: 'Unknown', class: 'status-unknown' };
        }
    }

    // Exact copy of filterAndDeduplicateIncidents
    function filterAndDeduplicateIncidents(incidentsData) {
        const uniqueIncidents = new Map();
        if (!incidentsData || incidentsData.length === 0) return uniqueIncidents;
        
        const now = new Date();
        const fortyEightHoursBack = new Date(now.getTime() - (48 * 60 * 60 * 1000));

        incidentsData.forEach(inc => {
            if (inc.status === 'Resolved') {
                let resolvedTs = inc.updatedAt ? new Date(inc.updatedAt) : null;
                if (inc.timeline) {
                    const resolvedEvent = inc.timeline.find(t => t.title === 'Resolved');
                    if (resolvedEvent && resolvedEvent.createdAt) {
                        resolvedTs = new Date(resolvedEvent.createdAt);
                    }
                }
                if (resolvedTs && resolvedTs < fortyEightHoursBack) {
                    return;
                }
            }
            if (inc && inc.id && !uniqueIncidents.has(inc.id)) {
                 uniqueIncidents.set(inc.id, inc);
            }
        });
        
        return uniqueIncidents;
    }

    // ======================================================================
    // TEST SUITES
    // ======================================================================

    // ----------------------------------------------------------
    // 1. getStatusInfo()
    // ----------------------------------------------------------
    describe('getStatusInfo — Status Mapping', () => {
        it('should return Operational for OK status', () => {
            const result = getStatusInfo('OK');
            expect(result.label).toBe('Operational');
            expect(result.class).toBe('status-ok');
            expect(result.raw).toBe('OK');
        });

        it('should return Incident for INCIDENT status', () => {
            const result = getStatusInfo('INCIDENT');
            expect(result.label).toBe('Incident');
            expect(result.class).toBe('status-critical');
        });

        it('should return Incident for MAJOR_INCIDENT_CORE', () => {
            const result = getStatusInfo('MAJOR_INCIDENT_CORE');
            expect(result.label).toBe('Incident');
            expect(result.class).toBe('status-critical');
        });

        it('should return Incident for MAJOR_INCIDENT_NONCORE', () => {
            const result = getStatusInfo('MAJOR_INCIDENT_NONCORE');
            expect(result.label).toBe('Incident');
            expect(result.class).toBe('status-critical');
        });

        it('should return Warning for DEGRADATION', () => {
            const result = getStatusInfo('DEGRADATION');
            expect(result.label).toBe('Warning');
            expect(result.class).toBe('status-warning');
        });

        it('should return Warning for MAINTENANCE_CORE', () => {
            const result = getStatusInfo('MAINTENANCE_CORE');
            expect(result.label).toBe('Warning');
            expect(result.class).toBe('status-warning');
        });

        it('should return Warning for MAINTENANCE_NONCORE', () => {
            const result = getStatusInfo('MAINTENANCE_NONCORE');
            expect(result.label).toBe('Warning');
            expect(result.class).toBe('status-warning');
        });

        it('should return Unknown for empty string', () => {
            const result = getStatusInfo('');
            expect(result.label).toBe('Unknown');
            expect(result.class).toBe('status-unknown');
            expect(result.raw).toBe('UNKNOWN');
        });

        it('should return Unknown for null', () => {
            const result = getStatusInfo(null);
            expect(result.label).toBe('Unknown');
            expect(result.raw).toBe('UNKNOWN');
        });

        it('should return Unknown for unrecognized status', () => {
            const result = getStatusInfo('BANANA');
            expect(result.label).toBe('Unknown');
            expect(result.raw).toBe('BANANA');
        });

        it('should be case insensitive', () => {
            const result = getStatusInfo('ok');
            expect(result.label).toBe('Operational');
        });
    });

    // ----------------------------------------------------------
    // 2. filterAndDeduplicateIncidents()
    // ----------------------------------------------------------
    describe('filterAndDeduplicateIncidents — Incident Filtering', () => {

        it('should return empty Map for null input', () => {
            const result = filterAndDeduplicateIncidents(null);
            expect(result.size).toBe(0);
        });

        it('should return empty Map for empty array', () => {
            const result = filterAndDeduplicateIncidents([]);
            expect(result.size).toBe(0);
        });

        it('should keep active incidents', () => {
            const incidents = [
                { id: 'INC001', status: 'Active', updatedAt: new Date().toISOString() }
            ];
            const result = filterAndDeduplicateIncidents(incidents);
            expect(result.size).toBe(1);
            expect(result.has('INC001')).toBeTruthy();
        });

        it('should keep recently resolved incidents (within 48h)', () => {
            const recentDate = new Date(Date.now() - 1 * 60 * 60 * 1000).toISOString(); // 1 hour ago
            const incidents = [
                { id: 'INC002', status: 'Resolved', updatedAt: recentDate }
            ];
            const result = filterAndDeduplicateIncidents(incidents);
            expect(result.size).toBe(1);
        });

        it('should filter out resolved incidents older than 48h', () => {
            const oldDate = new Date(Date.now() - 72 * 60 * 60 * 1000).toISOString(); // 72 hours ago
            const incidents = [
                { id: 'INC003', status: 'Resolved', updatedAt: oldDate }
            ];
            const result = filterAndDeduplicateIncidents(incidents);
            expect(result.size).toBe(0);
        });

        it('should use timeline resolved event timestamp over updatedAt', () => {
            const oldUpdatedAt = new Date(Date.now() - 72 * 60 * 60 * 1000).toISOString();
            const recentTimeline = new Date(Date.now() - 1 * 60 * 60 * 1000).toISOString();
            const incidents = [
                {
                    id: 'INC004',
                    status: 'Resolved',
                    updatedAt: oldUpdatedAt,
                    timeline: [{ title: 'Resolved', createdAt: recentTimeline }]
                }
            ];
            const result = filterAndDeduplicateIncidents(incidents);
            expect(result.size).toBe(1); // timeline says recent, so keep it
        });

        it('should deduplicate incidents by id', () => {
            const incidents = [
                { id: 'INC005', status: 'Active' },
                { id: 'INC005', status: 'Active' },
                { id: 'INC005', status: 'Active' }
            ];
            const result = filterAndDeduplicateIncidents(incidents);
            expect(result.size).toBe(1);
        });

        it('should skip incidents without an id', () => {
            const incidents = [
                { status: 'Active' }, // no id
                { id: null, status: 'Active' },
                { id: 'INC006', status: 'Active' }
            ];
            const result = filterAndDeduplicateIncidents(incidents);
            expect(result.size).toBe(1);
        });

        it('should handle mix of active, recent resolved, and old resolved', () => {
            const recentDate = new Date(Date.now() - 1 * 60 * 60 * 1000).toISOString();
            const oldDate = new Date(Date.now() - 96 * 60 * 60 * 1000).toISOString();
            const incidents = [
                { id: 'INC_A', status: 'Active' },
                { id: 'INC_B', status: 'Resolved', updatedAt: recentDate },
                { id: 'INC_C', status: 'Resolved', updatedAt: oldDate }
            ];
            const result = filterAndDeduplicateIncidents(incidents);
            expect(result.size).toBe(2); // INC_A and INC_B
            expect(result.has('INC_A')).toBeTruthy();
            expect(result.has('INC_B')).toBeTruthy();
            expect(result.has('INC_C')).toBeFalsy();
        });

        it('should keep resolved incident at exactly 48h boundary', () => {
            // Exactly 48h ago — should NOT be filtered (not strictly less than)
            const exactlyAt = new Date(Date.now() - 48 * 60 * 60 * 1000).toISOString();
            const incidents = [
                { id: 'INC_BOUNDARY', status: 'Resolved', updatedAt: exactlyAt }
            ];
            const result = filterAndDeduplicateIncidents(incidents);
            // At exact boundary, resolvedTs === fortyEightHoursBack, so < is false → kept
            expect(result.size).toBe(1);
        });
    });

    // ----------------------------------------------------------
    // 3. Configuration Data Structure
    // ----------------------------------------------------------
    describe('Configuration Data Structure', () => {

        it('should have correct shape for DEFAULT_CONFIG', () => {
            const config = [
                { prod: 'NA211', prodName: 'NA211', sandboxes: [{ id: 'CS71', name: 'CS71' }], shownServices: [] }
            ];
            expect(config[0].prod).toBe('NA211');
            expect(config[0].prodName).toBe('NA211');
            expect(config[0].sandboxes).toHaveLength(1);
            expect(config[0].sandboxes[0].id).toBe('CS71');
            expect(config[0].shownServices).toEqual([]);
        });

        it('should create correct org structure when adding with alias', () => {
            const val = 'AUS76';
            const alias = 'My Production';
            const newOrg = { prod: val, prodName: alias, sandboxes: [], shownServices: [] };
            expect(newOrg.prod).toBe('AUS76');
            expect(newOrg.prodName).toBe('My Production');
            expect(newOrg.sandboxes).toEqual([]);
            expect(newOrg.shownServices).toEqual([]);
        });

        it('should default alias to prod id if empty', () => {
            const val = 'AUS76';
            const aliasVal = '';
            const finalAlias = aliasVal ? aliasVal : val;
            expect(finalAlias).toBe('AUS76');
        });

        it('should use provided alias when given', () => {
            const val = 'AUS76';
            const aliasVal = 'DEPS';
            const finalAlias = aliasVal ? aliasVal : val;
            expect(finalAlias).toBe('DEPS');
        });
    });

    // ----------------------------------------------------------
    // 4. Instance Validation
    // ----------------------------------------------------------
    describe('Instance ID Validation', () => {
        const regex = /^[A-Z0-9]{2,15}$/;

        it('should accept valid instance ID: NA211', () => {
            expect(regex.test('NA211')).toBeTruthy();
        });

        it('should accept valid instance ID: CS71', () => {
            expect(regex.test('CS71')).toBeTruthy();
        });

        it('should accept valid instance ID: AUS76', () => {
            expect(regex.test('AUS76')).toBeTruthy();
        });

        it('should accept valid instance ID: ARE2S', () => {
            expect(regex.test('ARE2S')).toBeTruthy();
        });

        it('should reject single character', () => {
            expect(regex.test('A')).toBeFalsy();
        });

        it('should reject empty string', () => {
            expect(regex.test('')).toBeFalsy();
        });

        it('should reject lowercase', () => {
            expect(regex.test('na211')).toBeFalsy();
        });

        it('should reject special characters', () => {
            expect(regex.test('NA-211')).toBeFalsy();
        });

        it('should reject spaces', () => {
            expect(regex.test('NA 211')).toBeFalsy();
        });

        it('should reject strings over 15 characters', () => {
            expect(regex.test('ABCDEFGHIJKLMNOP')).toBeFalsy(); // 16 chars
        });

        it('should accept 15 character string', () => {
            expect(regex.test('ABCDEFGHIJKLMNO')).toBeTruthy(); // 15 chars
        });
    });

    // ----------------------------------------------------------
    // 5. Sub-Service Filter Logic
    // ----------------------------------------------------------
    describe('Sub-Service Filter Logic (shownServices)', () => {

        it('should start with empty shownServices for new orgs', () => {
            const org = { prod: 'TEST1', prodName: 'Test', sandboxes: [], shownServices: [] };
            expect(org.shownServices).toHaveLength(0);
        });

        it('should add a service when toggled on', () => {
            const org = { prod: 'TEST1', prodName: 'Test', sandboxes: [], shownServices: [] };
            const serviceKey = 'analytics';
            if (!org.shownServices.includes(serviceKey)) {
                org.shownServices.push(serviceKey);
            }
            expect(org.shownServices).toContain('analytics');
            expect(org.shownServices).toHaveLength(1);
        });

        it('should not duplicate a service when toggled on twice', () => {
            const org = { prod: 'TEST1', prodName: 'Test', sandboxes: [], shownServices: ['analytics'] };
            const serviceKey = 'analytics';
            if (!org.shownServices.includes(serviceKey)) {
                org.shownServices.push(serviceKey);
            }
            expect(org.shownServices).toHaveLength(1);
        });

        it('should remove a service when toggled off', () => {
            const org = { prod: 'TEST1', prodName: 'Test', sandboxes: [], shownServices: ['analytics', 'coreService'] };
            org.shownServices = org.shownServices.filter(s => s !== 'analytics');
            expect(org.shownServices).toHaveLength(1);
            expect(org.shownServices).toContain('coreService');
        });

        it('should filter visible services based on shownServices list', () => {
            const allServices = [
                { key: 'analytics', isCore: false },
                { key: 'coreService', isCore: true },
                { key: 'B2BCommerce', isCore: false },
                { key: 'EinsteinBots', isCore: false }
            ];
            const shownList = ['analytics', 'coreService'];
            const visible = allServices.filter(s => shownList.includes(s.key));
            expect(visible).toHaveLength(2);
            expect(visible[0].key).toBe('analytics');
            expect(visible[1].key).toBe('coreService');
        });

        it('should show no services when shownServices is empty', () => {
            const allServices = [
                { key: 'analytics', isCore: false },
                { key: 'coreService', isCore: true }
            ];
            const shownList = [];
            const visible = allServices.filter(s => shownList.includes(s.key));
            expect(visible).toHaveLength(0);
        });
    });

    // ----------------------------------------------------------
    // 6. Sandbox Management
    // ----------------------------------------------------------
    describe('Sandbox Management', () => {

        it('should add a sandbox to an org', () => {
            const org = { prod: 'NA211', prodName: 'NA211', sandboxes: [], shownServices: [] };
            org.sandboxes.push({ id: 'CS71', name: 'CS71' });
            expect(org.sandboxes).toHaveLength(1);
            expect(org.sandboxes[0].id).toBe('CS71');
        });

        it('should allow multiple sandboxes on same instance with different names', () => {
            const org = { prod: 'AUS76', prodName: 'DEPS', sandboxes: [], shownServices: [] };
            org.sandboxes.push({ id: 'AUS76', name: 'Staging' });
            org.sandboxes.push({ id: 'AUS76', name: 'SITUAT' });
            expect(org.sandboxes).toHaveLength(2);
            expect(org.sandboxes[0].name).toBe('Staging');
            expect(org.sandboxes[1].name).toBe('SITUAT');
        });

        it('should detect duplicate sandbox by id AND name', () => {
            const org = { prod: 'NA211', sandboxes: [{ id: 'CS71', name: 'CS71' }] };
            const val = 'CS71';
            const isDuplicate = org.sandboxes.some(s => s.id === val && s.name === val);
            expect(isDuplicate).toBeTruthy();
        });

        it('should NOT detect duplicate if same id but different name exists', () => {
            const org = { prod: 'NA211', sandboxes: [{ id: 'CS71', name: 'UAT' }] };
            const val = 'CS71';
            const isDuplicate = org.sandboxes.some(s => s.id === val && s.name === val);
            expect(isDuplicate).toBeFalsy();
        });

        it('should remove a sandbox by object reference', () => {
            const sb1 = { id: 'CS71', name: 'UAT' };
            const sb2 = { id: 'CS71', name: 'DEV' };
            const org = { prod: 'NA211', sandboxes: [sb1, sb2] };
            org.sandboxes = org.sandboxes.filter(s => s !== sb1);
            expect(org.sandboxes).toHaveLength(1);
            expect(org.sandboxes[0].name).toBe('DEV');
        });
    });

    // ----------------------------------------------------------
    // 7. Production Org Management
    // ----------------------------------------------------------
    describe('Production Org Management', () => {

        it('should detect duplicate production org', () => {
            const config = [
                { prod: 'NA211', prodName: 'NA211', sandboxes: [], shownServices: [] }
            ];
            const isDuplicate = config.some(g => g.prod === 'NA211');
            expect(isDuplicate).toBeTruthy();
        });

        it('should not detect duplicate for new org', () => {
            const config = [
                { prod: 'NA211', prodName: 'NA211', sandboxes: [], shownServices: [] }
            ];
            const isDuplicate = config.some(g => g.prod === 'AUS76');
            expect(isDuplicate).toBeFalsy();
        });

        it('should remove a production org and all sandboxes', () => {
            const config = [
                { prod: 'NA211', prodName: 'NA211', sandboxes: [{ id: 'CS71', name: 'CS71' }], shownServices: [] },
                { prod: 'AUS76', prodName: 'DEPS', sandboxes: [], shownServices: [] }
            ];
            const filtered = config.filter(g => g.prod !== 'NA211');
            expect(filtered).toHaveLength(1);
            expect(filtered[0].prod).toBe('AUS76');
        });

        it('should rename production org alias', () => {
            const org = { prod: 'NA211', prodName: 'NA211', sandboxes: [], shownServices: [] };
            org.prodName = 'Global Sales Hub';
            expect(org.prodName).toBe('Global Sales Hub');
            expect(org.prod).toBe('NA211'); // ID unchanged
        });
    });

    // ----------------------------------------------------------
    // 8. Export/Import Configuration
    // ----------------------------------------------------------
    describe('Export/Import Configuration', () => {

        it('should create valid export payload', () => {
            const config = [
                { prod: 'AUS76', prodName: 'DEPS', sandboxes: [{ id: 'AUS76', name: 'Staging' }], shownServices: ['analytics'] }
            ];
            const backup = { trackedConfig: config };
            const json = JSON.stringify(backup, null, 2);
            const parsed = JSON.parse(json);
            expect(parsed.trackedConfig).toHaveLength(1);
            expect(parsed.trackedConfig[0].prod).toBe('AUS76');
            expect(parsed.trackedConfig[0].shownServices).toContain('analytics');
        });

        it('should NOT include globalSettings in export', () => {
            const config = [{ prod: 'NA211', prodName: 'NA211', sandboxes: [], shownServices: [] }];
            const backup = { trackedConfig: config };
            expect(backup.globalSettings).toBeFalsy();
        });

        it('should validate import has trackedConfig array', () => {
            const validImport = { trackedConfig: [] };
            const isValid = validImport.trackedConfig && Array.isArray(validImport.trackedConfig);
            expect(isValid).toBeTruthy();
        });

        it('should reject import without trackedConfig', () => {
            const invalidImport = { someOtherKey: [] };
            const isValid = invalidImport.trackedConfig && Array.isArray(invalidImport.trackedConfig);
            expect(isValid).toBeFalsy();
        });

        it('should inject shownServices on import if missing', () => {
            const importData = {
                trackedConfig: [
                    { prod: 'NA211', prodName: 'NA211', sandboxes: [] }
                    // Note: no shownServices
                ]
            };
            importData.trackedConfig.forEach(g => {
                if (!g.shownServices) g.shownServices = [];
            });
            expect(importData.trackedConfig[0].shownServices).toEqual([]);
        });

        it('should preserve shownServices on import if present', () => {
            const importData = {
                trackedConfig: [
                    { prod: 'NA211', prodName: 'NA211', sandboxes: [], shownServices: ['analytics'] }
                ]
            };
            importData.trackedConfig.forEach(g => {
                if (!g.shownServices) g.shownServices = [];
            });
            expect(importData.trackedConfig[0].shownServices).toContain('analytics');
        });

        it('should roundtrip export → import correctly', () => {
            const original = [
                { prod: 'AUS76', prodName: 'DEPS', sandboxes: [{ id: 'CS71', name: 'UAT' }], shownServices: ['analytics', 'coreService'] },
                { prod: 'ARE2S', prodName: 'ARE2S', sandboxes: [], shownServices: [] }
            ];
            const exported = JSON.stringify({ trackedConfig: original }, null, 2);
            const imported = JSON.parse(exported);
            expect(imported.trackedConfig).toHaveLength(2);
            expect(imported.trackedConfig[0].shownServices).toHaveLength(2);
            expect(imported.trackedConfig[1].sandboxes).toHaveLength(0);
        });
    });

    // ----------------------------------------------------------
    // 9. Migration Logic
    // ----------------------------------------------------------
    describe('Migration — Legacy Data Formats', () => {

        it('should migrate old string array format', () => {
            const oldFormat = ['NA211', 'CS71', 'CS50'];
            const prods = oldFormat.filter(i => !i.startsWith('CS') && !i.startsWith('TEST'));
            const sandboxes = oldFormat.filter(i => i.startsWith('CS') || i.startsWith('TEST')).map(sb => ({ id: sb, name: sb }));
            
            expect(prods).toHaveLength(1);
            expect(prods[0]).toBe('NA211');
            expect(sandboxes).toHaveLength(2);
            expect(sandboxes[0].id).toBe('CS71');
        });

        it('should migrate old object format without prodName', () => {
            const oldFormat = [{ prod: 'NA211', sandboxes: ['CS71'] }];
            const migrated = oldFormat.map(g => ({
                prod: g.prod,
                prodName: g.prodName || g.prod,
                sandboxes: (g.sandboxes || []).map(sb => typeof sb === 'string' ? { id: sb, name: sb } : sb)
            }));
            expect(migrated[0].prodName).toBe('NA211');
            expect(migrated[0].sandboxes[0].id).toBe('CS71');
            expect(migrated[0].sandboxes[0].name).toBe('CS71');
        });

        it('should migrate shownServicesByOrg from global settings into org', () => {
            const config = [
                { prod: 'AUS76', prodName: 'DEPS', sandboxes: [] },
                { prod: 'ARE2S', prodName: 'ARE2S', sandboxes: [] }
            ];
            const oldSettings = {
                shownServicesByOrg: {
                    'AUS76': ['analytics', 'coreService']
                }
            };
            config.forEach(g => {
                if (!g.shownServices) {
                    g.shownServices = oldSettings.shownServicesByOrg[g.prod] || [];
                }
            });
            expect(config[0].shownServices).toHaveLength(2);
            expect(config[0].shownServices).toContain('analytics');
            expect(config[1].shownServices).toHaveLength(0);
        });

        it('should not overwrite existing shownServices during migration', () => {
            const config = [
                { prod: 'AUS76', prodName: 'DEPS', sandboxes: [], shownServices: ['B2BCommerce'] }
            ];
            const oldSettings = {
                shownServicesByOrg: {
                    'AUS76': ['analytics', 'coreService']
                }
            };
            config.forEach(g => {
                if (!g.shownServices) {
                    g.shownServices = oldSettings.shownServicesByOrg[g.prod] || [];
                }
            });
            // Should keep the existing shownServices, not overwrite
            expect(config[0].shownServices).toHaveLength(1);
            expect(config[0].shownServices).toContain('B2BCommerce');
        });
    });

    // ----------------------------------------------------------
    // 10. LocalStorage Serialization
    // ----------------------------------------------------------
    describe('LocalStorage Serialization', () => {

        it('should serialize trackedConfig to JSON correctly', () => {
            const config = [
                { prod: 'NA211', prodName: 'Hub', sandboxes: [], shownServices: ['analytics'] }
            ];
            const json = JSON.stringify(config);
            const parsed = JSON.parse(json);
            expect(parsed[0].prod).toBe('NA211');
            expect(parsed[0].shownServices[0]).toBe('analytics');
        });

        it('should handle empty config', () => {
            const config = [];
            const json = JSON.stringify(config);
            const parsed = JSON.parse(json);
            expect(parsed).toHaveLength(0);
        });

        it('should preserve sandbox object references through serialization', () => {
            const config = [
                { prod: 'AUS76', prodName: 'DEPS', sandboxes: [
                    { id: 'AUS76', name: 'Staging' },
                    { id: 'AUS76', name: 'SITUAT' }
                ], shownServices: [] }
            ];
            const roundTripped = JSON.parse(JSON.stringify(config));
            expect(roundTripped[0].sandboxes).toHaveLength(2);
            expect(roundTripped[0].sandboxes[0].name).toBe('Staging');
            expect(roundTripped[0].sandboxes[1].name).toBe('SITUAT');
        });
    });

    // ----------------------------------------------------------
    // 11. Service Sorting Logic
    // ----------------------------------------------------------
    describe('Service Sorting — Core First', () => {

        it('should sort core services before non-core', () => {
            const services = [
                { key: 'analytics', isCore: false },
                { key: 'coreService', isCore: true },
                { key: 'B2BCommerce', isCore: false },
                { key: 'liveAgent', isCore: true }
            ];
            const sorted = services.sort((a, b) => {
                if (a.isCore && !b.isCore) return -1;
                if (!a.isCore && b.isCore) return 1;
                return a.key.localeCompare(b.key);
            });
            expect(sorted[0].key).toBe('coreService');
            expect(sorted[1].key).toBe('liveAgent');
            expect(sorted[2].key).toBe('analytics');
            expect(sorted[3].key).toBe('B2BCommerce');
        });

        it('should sort alphabetically within same core group', () => {
            const services = [
                { key: 'zebra', isCore: false },
                { key: 'alpha', isCore: false },
                { key: 'middle', isCore: false }
            ];
            const sorted = services.sort((a, b) => a.key.localeCompare(b.key));
            expect(sorted[0].key).toBe('alpha');
            expect(sorted[1].key).toBe('middle');
            expect(sorted[2].key).toBe('zebra');
        });
    });

    // ----------------------------------------------------------
    // 12. Org Group Badge Logic
    // ----------------------------------------------------------
    describe('Org Group Badge Text', () => {

        it('should show "Operational" when status is OK and no incidents', () => {
            const status = 'OK';
            const filteredIncidents = new Map();
            const statusInfo = getStatusInfo(status);
            const badgeText = filteredIncidents.size > 0 ? 'Active Incidents' : statusInfo.label;
            expect(badgeText).toBe('Operational');
        });

        it('should show "Active Incidents" when there are active incidents', () => {
            const filteredIncidents = new Map();
            filteredIncidents.set('INC1', { id: 'INC1', status: 'Active' });
            const firstInc = Array.from(filteredIncidents.values())[0];
            const badgeText = filteredIncidents.size > 0 
                ? (firstInc.status === 'Resolved' ? 'Resolved Incident' : 'Active Incidents') 
                : 'Operational';
            expect(badgeText).toBe('Active Incidents');
        });

        it('should show "Resolved Incident" when only resolved incidents remain', () => {
            const filteredIncidents = new Map();
            filteredIncidents.set('INC1', { id: 'INC1', status: 'Resolved' });
            const firstInc = Array.from(filteredIncidents.values())[0];
            const badgeText = firstInc.status === 'Resolved' ? 'Resolved Incident' : 'Active Incidents';
            expect(badgeText).toBe('Resolved Incident');
        });
    });

    // ======================================================================
    // Render Results
    // ======================================================================
    function renderResults() {
        const container = document.getElementById('results');
        let totalPassed = 0;
        let totalFailed = 0;

        suites.forEach(suite => {
            const passed = suite.tests.filter(t => t.passed).length;
            const failed = suite.tests.filter(t => !t.passed).length;
            totalPassed += passed;
            totalFailed += failed;

            let html = `<div class="suite">`;
            html += `<div class="suite-header">
                <span>${suite.name}</span>
                <span><span class="badge pass">${passed} pass</span> ${failed > 0 ? `<span class="badge fail">${failed} fail</span>` : ''}</span>
            </div>`;
            
            suite.tests.forEach(test => {
                html += `<div class="test-row">
                    <span>${test.passed ? '✅' : '❌'} ${test.name}</span>
                    <span class="${test.passed ? 'pass' : 'fail'}">${test.passed ? 'PASS' : 'FAIL'}</span>
                </div>`;
                if (test.error) {
                    html += `<div class="error-detail">↳ ${test.error}</div>`;
                }
            });
            
            html += `</div>`;
            container.innerHTML += html;
        });

        const totalsEl = document.getElementById('totals');
        const allPassed = totalFailed === 0;
        totalsEl.innerHTML = `
            ${allPassed ? '🎉' : '⚠️'} 
            <span class="pass">${totalPassed} passed</span> / 
            <span class="${totalFailed > 0 ? 'fail' : 'pass'}">${totalFailed} failed</span> 
            — ${totalPassed + totalFailed} total tests
        `;
    }

    renderResults();
    </script>
