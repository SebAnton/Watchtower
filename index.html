<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watchtower</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏰</text></svg>">
    <!-- Modern typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Phosphor Icons for premium minimalist icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Background Elements for Glassmorphism -->
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>
    <div class="bg-shape shape-3"></div>

    <div class="app-container">
        <!-- Sidebar Navigation & Config -->
        <aside class="sidebar glass-panel">
            <div class="sidebar-header">
                <i class="ph ph-cloud-warning text-gradient"></i>
                <h2>Configuration</h2>
                <button id="sidebar-close-mobile" class="btn-icon sidebar-close-mobile" title="Close" aria-label="Close configuration">
                    <i class="ph ph-x"></i>
                </button>
            </div>
            
            <div class="sidebar-content">
                <div class="config-section">
                    <h3>Salesforce</h3>
                    <p class="subtitle">Add a Production Org to track it and its related sandboxes.</p>
                    
                    <div id="instance-list" class="instance-list">
                        <!-- Populated via JS with new hierarchy -->
                    </div>

                    <form id="add-instance-form" class="add-instance-form">
                        <div class="input-group" style="flex-direction: column;">
                            <input type="text" id="new-instance-input" placeholder="e.g. NA211 (Server ID)" required autocomplete="off">
                            <div style="display:flex; gap:0.5rem; width:100%;">
                                <input type="text" id="new-instance-alias" placeholder="Alias (Optional)" autocomplete="off" style="flex-grow:1;">
                                <button type="submit" class="btn-primary" aria-label="Add Org">
                                    <i class="ph ph-plus"></i> Add
                                </button>
                            </div>
                        </div>
                        <span id="input-error" class="error-msg hidden">Please enter a valid instance.</span>
                    </form>
                </div>
                
                <hr style="border: none; border-top: 1px solid var(--border-glass); margin: 1.5rem 0;">

                <div class="config-section">
                    <h3>External Services</h3>
                    <p class="subtitle">Track global status for 3rd party tools.</p>
                    
                    <div id="external-list" class="instance-list">
                        <!-- Populated via JS -->
                    </div>

                    <form id="add-external-form" class="add-instance-form" style="display:flex; gap:0.5rem; width:100%;">
                        <select id="new-external-select" style="flex-grow:1; background: rgba(0, 0, 0, 0.2); border: 1px solid var(--border-glass); border-radius: 0.75rem; padding: 0.75rem 1rem; color: var(--text-primary); font-family: var(--font-family); font-size: 0.95rem; outline: none;">
                            <option value="" disabled selected>Select a Service</option>
                            <!-- Options populated via JS -->
                        </select>
                        <button type="button" id="btn-add-external" class="btn-primary" aria-label="Add Service">
                            <i class="ph ph-plus"></i> Add
                        </button>
                    </form>
                </div>
            </div>

            <div class="sidebar-footer">
                <details class="settings-details">
                    <summary><i class="ph ph-gear"></i> Settings</summary>
                    <div class="settings-details-content">
                        <div class="app-title-section">
                            <label for="app-title-input">App title</label>
                            <input type="text" id="app-title-input" placeholder="Watchtower" autocomplete="off">
                        </div>
                        <div class="refresh-interval-section">
                            <label for="refresh-interval-input">Refresh interval (minutes)</label>
                            <input type="number" id="refresh-interval-input" min="1" max="120" placeholder="2" autocomplete="off">
                        </div>
                    </div>
                </details>
                <div class="sidebar-actions" style="display: flex; gap: 0.5rem; justify-content: center; margin-bottom: 1rem;">
                    <button id="btn-export" class="btn-secondary" style="font-size: 0.8rem; padding: 0.4rem 0.8rem; flex-grow: 1;" title="Export Config">
                        <i class="ph ph-download-simple"></i> Export
                    </button>
                    <button id="btn-import" class="btn-secondary" style="font-size: 0.8rem; padding: 0.4rem 0.8rem; flex-grow: 1;" title="Import Config">
                        <i class="ph ph-upload-simple"></i> Import
                    </button>
                    <input type="file" id="import-file" accept=".json" class="hidden">
                </div>
                <p>Status data provided by <br><a href="https://status.salesforce.com" target="_blank">Salesforce Trust <i class="ph ph-arrow-up-right"></i></a></p>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="top-nav glass-panel">
                <div class="nav-left" style="display: flex; align-items: center; gap: 1rem;">
                    <button id="sidebar-toggle" class="btn-icon" title="Toggle Sidebar">
                        <i class="ph ph-list"></i>
                    </button>
                    <div>
                        <h1 id="app-title">Watchtower</h1>
                        <span class="last-updated" id="last-updated">Last checked: Just now</span>
                    </div>
                </div>
                <div class="nav-right" style="display: flex; align-items: center; gap: 0.5rem;">
                    <div class="view-toggle" role="group" aria-label="Dashboard view">
                        <button id="view-cards-btn" class="btn-icon btn-view active" title="Card view">
                            <i class="ph ph-squares-four"></i>
                        </button>
                        <button id="view-table-btn" class="btn-icon btn-view" title="Table view">
                            <i class="ph ph-table"></i>
                        </button>
                    </div>
                    <button id="refresh-btn" class="btn-icon" title="Refresh Now">
                        <i class="ph ph-arrows-clockwise"></i>
                    </button>
                </div>
            </header>

            <div class="dashboard-scroll-area">
                <div class="dashboard-grid" id="status-grid">
                    <!-- Status Cards Rendered Here via JS -->
                    <!-- Example Skeleton Card while Loading -->
                    <div class="status-card glass-panel skeleton">
                        <div class="card-header">
                            <div class="skeleton-text short"></div>
                            <div class="skeleton-circle"></div>
                        </div>
                        <div class="skeleton-text long"></div>
                        <div class="skeleton-text medium"></div>
                    </div>
                    <div class="status-card glass-panel skeleton">
                        <div class="card-header">
                            <div class="skeleton-text short"></div>
                            <div class="skeleton-circle"></div>
                        </div>
                        <div class="skeleton-text long"></div>
                        <div class="skeleton-text medium"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Custom Confirm Modal -->
    <div id="confirm-modal" class="modal-overlay hidden">
        <div class="modal-content glass-panel">
            <h3 style="margin-top:0; display:flex; align-items:center; gap:0.5rem;"><i class="ph ph-warning-circle" style="color:var(--status-warning)"></i> Confirm Action</h3>
            <p id="confirm-message" style="color:var(--text-secondary); margin: 1rem 0 1.5rem 0; font-size: 0.95rem;"></p>
            <div style="display:flex; justify-content:flex-end; gap:0.8rem;">
                <button id="confirm-cancel" class="btn-secondary">Cancel</button>
                <button id="confirm-ok" class="btn-primary" style="background:var(--status-critical); border-color:var(--status-critical);">Delete</button>
            </div>
        </div>
    </div>
    
    <!-- Modular application scripts (load order matters) -->
    <script src="js/utils.js"></script>
    <script src="js/constants.js"></script>
    <script src="js/state.js"></script>
    <script src="js/dom.js"></script>
    <script src="js/status.js"></script>
    <script src="js/api.js"></script>
    <script src="js/modal.js"></script>
    <script src="js/config.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/events.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
